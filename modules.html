<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modules</title>
  <link rel="stylesheet" href="modules.css" />
  <script>fetch("api/check_auth.php",{credentials:"same-origin"}).then(function(r){if(!r.ok){sessionStorage.removeItem("user");window.location.replace("login.html");}});</script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <img src="images/logo.jpg" alt="Logo Douanes" class="brand-logo" />
          <div>
            <h2>Douanes du Cameroun</h2>
            <p>Cellule Informatique</p>
          </div>
        </div>

        <nav class="menu">
          <a href="dashboard.html">Tableau de bord</a>
          <a href="stagiaires.html">Stagiaires</a>
          <a href="encadreurs.html">Encadreurs</a>
          <a href="modules.html" class="active">Modules</a>
          <a href="affectations.html">Affectations</a>
          <a href="evaluations.html">Evaluations</a>
          <a href="presence.html">Presences</a>
          <a href="attestations.html">Attestations</a>
        </nav>
      </div>

      <div class="menu footer-menu">
        <a id="logoutBtn" href="#">Deconnexion</a>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Modules</h1>
          <p>Modules de formation de la cellule informatique</p>
        </div>
        <button id="newModuleBtn" class="btn btn-primary">+ Nouveau module</button>
      </header>

      <section id="modulesGrid" class="modules-grid"></section>
    </main>
  </div>

  <div id="moduleModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Nouveau module</h3>
        <button class="icon-btn" data-close-modal="moduleModal">x</button>
      </div>
      <form id="moduleForm" class="modal-body">
        <input type="hidden" id="moduleId" />
        <label>Titre
          <input id="moduleTitle" required />
        </label>
        <label>Description
          <textarea id="moduleDesc" rows="3" required></textarea>
        </label>
        <label>Duree
          <input id="moduleDuration" placeholder="10 jours" required />
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-light" data-close-modal="moduleModal">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="modules.js"></script>
  <script>document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("logoutBtn");if(b){b.addEventListener("click",function(e){e.preventDefault();fetch("api/logout.php",{credentials:"same-origin"}).finally(function(){sessionStorage.removeItem("user");window.location.replace("login.html");});});}});</script>
</body>
</html>
